<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="icon" type="image/png" href="assets/imgs/favicons/mainIcon.png">

	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/stitch.css">
	<link rel="stylesheet" href="css/home.css">
	<script src="js/components.js" defer></script>
	<script src="js/buttons.js" defer></script>

	<title>Stitchlings!</title>
</head>

<body>
	<nav-bar base></nav-bar>

	<div id="parallax">
		<img src="assets/imgs/parallax/keyArt.jpg" />
	</div>

	<div id="header" class="row">
		<div class="left-col">
			<iframe width="560" height="315" src="https://www.youtube.com/embed/xlKDBxx47UQ?si=orccsNY2ltN-rvkh?autoplay=1"
				title="Stitchlings Trailer" frameborder="0"
				allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
				referrerpolicy="strict-origin-when-cross-origin" allowfullscreen>
			</iframe>
		</div>

		<img src="./assets/imgs/homepage/stitchlings.png" alt="stitchlings-sketch" class="sketch" />

		<div class="col">
			<img src="./assets/imgs/logo.png" alt="logo" class="logo" />
			<a href="https://store.steampowered.com/app/4200560/Stitchlings/" target="_blank">
				<sprite-btn id="play-btn" imgId="play" base></sprite-btn>
			</a>
		</div>
	</div>

	<div id="content">
		<div id="tagline">
			<h1>Catchy tagline here! </h1>
			<p>Lorem ipsum dolor sit amet consectetur. Aliquet venenatis morbi in varius in egestas sit. Massa mattis
				phasellus enim suspendisse morbi.</p>
		</div>

		<img src="./assets/imgs/homepage/decorations.png" alt="deco" class="deco" />
		<img src="./assets/imgs/homepage/features.png" alt="features" class="features" />

		<h1 id="screenshotsTitle">Screenshots</h1>
		<div id="screenshots">
			<img src="./assets/imgs/homepage/screenshots.png" alt="screenshots" class="screenImg">
		</div>
	</div>

	<stitch-footer base></stitch-footer>
</body>

</html>
